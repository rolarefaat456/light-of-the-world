name: ligthoftheworld
description: "A new Flutter project."
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  animated_toggle_switch: ^0.8.7
  bloc: ^9.2.1
  cupertino_icons: ^1.0.8
  equatable: ^2.0.8
  flutter:
    sdk: flutter
  flutter_bloc: ^9.1.1
  flutter_heatmap_calendar: ^1.0.5
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  gap: ^3.0.1
  go_router: ^17.2.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  intl: ^0.20.2
  table_calendar: ^3.2.0

dev_dependencies:
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter:

  uses-material-design: true
  assets:
    - assets/images/

  fonts:
    - family: Almarai
      fonts:
        - asset: assets/fonts/Almarai-Regular.ttf
          weight: 400
        - asset: assets/fonts/Almarai-ExtraBold.ttf
          weight: 800
    - family: Tajawal
      fonts:
        - asset: assets/fonts/Tajawal-Regular.ttf
          weight: 400
        - asset: assets/fonts/Tajawal-Medium.ttf
          weight: 500

flutter_native_splash:
  color: "#ffffff"
  image: assets/images/logoLightMode.PNG

  color_dark: "#000000"
  image_dark: assets/images/logoNightMode.PNG

  android: true
  ios: true

  android_12:
    color: "#ffffff"
    image: assets/images/logoLightMode.PNG
    icon_background_color: "#ffffff"

    color_dark: "#000000"
    image_dark: assets/images/logoNightMode.PNG
    icon_background_color_dark: "#000000"

flutter_assets:
  assets_path: assets/images/
  output_path: lib/core/utils/
  filename: app_images.dart
  field_prefix: null
flutter_intl:
  enabled: true

flutter_launcher_icons:
  android: true
  ios: true

  image_path: assets/images/splashLightMode.PNG

  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: assets/images/splashLightMode.PNG
